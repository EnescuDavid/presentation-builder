<!-- Gallery Mode: Open via local server (npx serve) -- file:// won't load iframes -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Gallery</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 2rem;
      color: #333;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1.5rem;
    }

    .slide-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }

    .slide-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .slide-card iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      pointer-events: none;
      display: block;
    }

    .slide-card .slide-label {
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: #666;
      border-top: 1px solid #eee;
    }

    .slide-card__badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 500;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 4px;
      text-transform: lowercase;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>Slide Gallery</h1>
  <div class="gallery-grid" id="gallery"></div>

  <noscript>
    <p>JavaScript is required to load the slide gallery. Please enable JavaScript and reload.</p>
  </noscript>

  <script>
    // Configuration -- set these for your presentation
    const PRESENTATION = '../projects/example/presentation.html';
    const SLIDE_COUNT = 12; // adjust per presentation

    const gallery = document.getElementById('gallery');

    for (let i = 0; i < SLIDE_COUNT; i++) {
      const card = document.createElement('div');
      card.className = 'slide-card';

      const iframe = document.createElement('iframe');
      iframe.src = `${PRESENTATION}#/${i}`;
      iframe.loading = 'lazy';
      iframe.title = `Slide ${i + 1}`;

      const label = document.createElement('div');
      label.className = 'slide-label';

      const labelText = document.createElement('span');
      labelText.textContent = `Slide ${i + 1}`;
      label.appendChild(labelText);

      card.appendChild(iframe);

      // Extract component type badge from iframe content after load
      iframe.addEventListener('load', () => {
        try {
          const doc = iframe.contentDocument;
          if (doc) {
            const section = doc.querySelector('section[data-component]');
            if (section) {
              const type = section.getAttribute('data-component');
              const badge = document.createElement('span');
              badge.className = 'slide-card__badge';
              badge.textContent = type;
              label.insertBefore(badge, labelText);
            }
          }
        } catch (e) {
          // Cross-origin or loading error -- degrade gracefully (show slide number only)
        }
      });

      card.appendChild(label);

      card.addEventListener('click', () => {
        window.open(`${PRESENTATION}#/${i}`, '_blank');
      });

      gallery.appendChild(card);
    }
  </script>
</body>
</html>
