<!--
  ============================================================================
  COMPONENT: Timeline/Process (COMP-11)
  ============================================================================

  USE WHEN:
    Project roadmap. Process flow. Milestones. Sequential steps.
    Implementation phases.

  REQUIRED SLOTS:
    - 3-6 steps each with marker label and content title

  OPTIONAL SLOTS:
    - Slide title (h2)
    - Step description text

  MASTER LAYER: Visible

  LAYOUT NOTES:
    - Template shows horizontal layout (best for 3-4 steps)
    - For 5-6 steps switch to vertical by changing flex-direction on track
      and adjusting connector pseudo-elements
    - Claude picks orientation based on content
    - Connectors use ::after pseudo-elements anchored to marker center
      (top: 18px = half of 36px marker)
    - Step content uses compact font sizes for German text
  FRAGMENTS: Optional — Claude adds fragment classes for progressive reveal when requested

  EXAMPLE:
    <section data-component="timeline">
      <div class="comp-timeline">
        <h2 class="comp-timeline__title">Projektfahrplan</h2>
        <div class="comp-timeline__track">
          <div class="comp-timeline__step">
            <div class="comp-timeline__marker">Q1</div>
            <div class="comp-timeline__content">
              <h3>Phase 1</h3>
              <p>Kurze Beschreibung</p>
            </div>
          </div>
        </div>
      </div>
    </section>

  ============================================================================
-->

<style>
  /* --- Timeline/Process Component --- */
  .comp-timeline {
    display: flex;
    flex-direction: column;
    padding: var(--spacing-2xl) var(--spacing-3xl);
    min-height: 100%;
    overflow-wrap: break-word;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  .comp-timeline__title {
    font-size: var(--font-size-heading);
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
    margin-bottom: var(--spacing-2xl);
  }

  .comp-timeline__track {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    padding: 0 var(--spacing-lg);
    flex: 1;
  }

  .comp-timeline__step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    padding: 0 var(--spacing-sm);
  }

  /* Connector line between markers */
  .comp-timeline__step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 18px;
    left: calc(50% + 20px);
    right: calc(-50% + 20px);
    height: 2px;
    background: var(--color-border);
  }

  .comp-timeline__marker {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-full);
    background: var(--color-accent);
    color: var(--color-on-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: var(--font-weight-bold);
    font-size: var(--font-size-caption);
    z-index: 1;
    flex-shrink: 0;
    margin-bottom: var(--spacing-md);
  }

  .comp-timeline__content h3 {
    font-size: var(--font-size-subheading);
    font-weight: var(--font-weight-semibold);
    color: var(--color-primary);
    margin-bottom: var(--spacing-xs);
  }

  .comp-timeline__content p {
    font-size: var(--font-size-caption);
    color: var(--color-text-muted);
    line-height: var(--line-height-normal);
  }
</style>

<section data-component="timeline">
  <div class="comp-timeline">
    <h2 class="comp-timeline__title">Projektfahrplan 2026-2027</h2>
    <div class="comp-timeline__track">
      <div class="comp-timeline__step">
        <div class="comp-timeline__marker">Q1</div>
        <div class="comp-timeline__content">
          <h3>Analyse</h3>
          <p>Marktforschung und Bedarfsanalyse der Zielgruppen</p>
        </div>
      </div>
      <div class="comp-timeline__step">
        <div class="comp-timeline__marker">Q2</div>
        <div class="comp-timeline__content">
          <h3>Konzeption</h3>
          <p>Strategieentwicklung und Pilotplanung</p>
        </div>
      </div>
      <div class="comp-timeline__step">
        <div class="comp-timeline__marker">Q3</div>
        <div class="comp-timeline__content">
          <h3>Pilotphase</h3>
          <p>Prototyp-Entwicklung und Nutzertests</p>
        </div>
      </div>
      <div class="comp-timeline__step">
        <div class="comp-timeline__marker">Q4</div>
        <div class="comp-timeline__content">
          <h3>Rollout</h3>
          <p>Unternehmensweite Einführung und Schulung</p>
        </div>
      </div>
    </div>
  </div>
</section>
