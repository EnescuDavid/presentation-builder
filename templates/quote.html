<!--
  ============================================================================
  COMPONENT: quote
  ============================================================================

  USE WHEN:
    Customer quote. Expert endorsement. Key statement emphasis.
    CEO vision statement. Research finding highlight.

  REQUIRED SLOTS:
    - comp-quote__text: The quote body (blockquote element)
    - comp-quote__author: Speaker name

  OPTIONAL SLOTS:
    - comp-quote__role: Speaker role, title, or company
    - comp-quote__photo: Speaker headshot (img, 56x56 rounded)

  CSS VARIABLES (set on the <section> wrapper to customize):
    --comp-quote-padding      Outer padding. Default: var(--spacing-3xl)
    --comp-quote-text-size    Quote font size. Default: var(--font-size-heading)
    --comp-quote-text-color   Quote text color. Default: var(--color-primary)
    --comp-quote-accent-color Decorative quotation mark color. Default: var(--color-accent)

  STATE MODIFIERS (on comp-quote__text):
    .comp-quote__text--highlighted  Renders quote in accent color for extra emphasis

  MASTER LAYER: Visible

  LAYOUT NOTES:
    - Centered layout, centered text, centered attribution
    - Decorative opening quotation mark via ::before pseudo-element (0.3 opacity)
    - max-width 800px on quote text prevents overly wide lines
    - overflow-wrap and hyphens enabled for German compound words
    - Photo is optional; omit img element if no photo available
  ============================================================================
-->

<section id="slide-1" data-component="quote" role="group" aria-label="Zitat">
  <div class="comp-quote">

    <blockquote class="comp-quote__text">
      Die beste Strategie ist nutzlos ohne konsequente Umsetzung.
    </blockquote>

    <div class="comp-quote__author">Dr. Hans Mueller</div>
    <div class="comp-quote__role">Vorstandsvorsitzender, Mustermann AG</div>

  </div>
</section>
