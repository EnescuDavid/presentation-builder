<!--
  ============================================================================
  COMPONENT: chart
  ============================================================================

  USE WHEN:
    Data visualization slides. Trend analysis. Market share breakdowns.
    KPI comparison over time. Bar, line, pie, doughnut, radar chart types.

  REQUIRED SLOTS:
    - comp-chart__title: Slide heading (h2)
    - comp-chart__canvas: A <canvas> element with data-chart-config JSON attribute

  OPTIONAL SLOTS:
    - comp-chart__legend: Manual legend items (usually generated by Chart.js)
    - comp-chart__legend-item: Individual legend row with dot + label

  REQUIRES (CDN):
    - Chart.js 4.x loaded in skeleton (conditionally via chart-init script)
    - chartjs-plugin-annotation for target/benchmark lines (optional)
    - Lazy init via initSlideCharts() in skeleton — no manual init needed

  CSS VARIABLES (set on the <section> wrapper to customize):
    --comp-chart-padding       Outer padding. Default: var(--spacing-2xl) var(--spacing-3xl)
    --comp-chart-title-color   Slide title color. Default: var(--color-primary)
    --comp-chart-canvas-height Canvas max-height. Default: 400px

  STATE MODIFIERS:
    (none — chart visual state is controlled by Chart.js data and options)

  MASTER LAYER: Visible

  HOW IT WORKS:
    The data-chart-config attribute contains the full Chart.js config as JSON
    (type, data, options). The skeleton's initSlideCharts() parses this,
    merges consulting defaults (no gridlines, token fonts, bottom legend),
    auto-assigns token colors to datasets, and creates the Chart instance.
    Charts animate once on first appearance (animate-once via chartInstances).

  CHART TYPES:
    type: "bar"      Bar chart (vertical, horizontal with indexAxis:"y")
    type: "line"     Line chart (tension: 0.3 for slight curve)
    type: "pie"      Pie chart (no legend by default)
    type: "doughnut" Doughnut chart
    type: "radar"    Radar/spider chart

  LAYOUT NOTES:
    - Set hyphens: none on canvas container (code convention)
    - Legend can be hidden via options.plugins.legend.display: false
    - overflow-wrap and hyphens enabled on outer wrapper for German labels
  ============================================================================
-->

<section id="slide-1" data-component="chart" role="group" aria-label="Diagramm">
  <div class="comp-chart">

    <h2 class="comp-chart__title">Umsatzentwicklung 2020&ndash;2025</h2>

    <!-- Bar chart example: Umsatz in Mio. EUR by year -->
    <canvas class="comp-chart__canvas"
      aria-label="Balkendiagramm Umsatzentwicklung 2020 bis 2025"
      data-chart-config='{
        "type": "bar",
        "data": {
          "labels": ["2020", "2021", "2022", "2023", "2024", "2025 (P)"],
          "datasets": [{
            "label": "Umsatz (Mio. EUR)",
            "data": [62.4, 68.1, 75.3, 84.2, 91.8, 102.5]
          }]
        },
        "options": {
          "plugins": {
            "legend": { "display": false }
          },
          "scales": {
            "y": {
              "ticks": { "callback": "function(v){ return v + \" Mio.\"; }" }
            }
          }
        }
      }'
    ></canvas>

  </div>
</section>
