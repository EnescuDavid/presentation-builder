<!--
  COMPONENT: agenda
  USE WHEN: Presentation roadmap, meeting structure, outlining what's coming next.
  SLOTS:
    REQUIRED: __title (h2): "Agenda" or presentation-specific title
    REQUIRED: __list (ul): ordered list of agenda items
    REQUIRED: __item (li): individual agenda entry — supports state modifiers
    REQUIRED: __number (span inside __item): section number (01, 02, etc.)
    OPTIONAL: description text inside __item after the number span
  CSS VARIABLES (--comp-*):
    --comp-agenda-padding: var(--spacing-2xl) var(--spacing-3xl) — outer padding
    --comp-agenda-item-gap: var(--spacing-md) — gap between agenda items
    --comp-agenda-number-color: var(--color-accent) — number badge color
    --comp-agenda-title-color: var(--color-primary) — title text color
  STATE MODIFIERS:
    .comp-agenda__item--active — accent background + left border, currently active section
    .comp-agenda__item--completed — success color, past/finished section
    .comp-agenda__item--muted — reduced opacity (0.45), future / skipped items
  MASTER LAYER: yes — visible
  LAYOUT NOTES:
    Flex column, justify-content: center, full height. Works with 3-8 agenda items.
    Active item: background highlight + left accent border (3px solid --color-accent).
    Number badge uses min-width: 1.5em so numbers align across items.
    German section titles: hyphens: auto handles compound nouns.
-->

<!-- Component CSS: see tokens/components.css -> comp-agenda section -->

<section id="slide-7" data-component="agenda" role="group" aria-label="Agenda">
  <div class="comp-agenda">
    <h2 class="comp-agenda__title">Agenda</h2>
    <ul class="comp-agenda__list">
      <li class="comp-agenda__item comp-agenda__item--completed">
        <span class="comp-agenda__number">01</span>
        Marktanalyse und Wettbewerbslandschaft
      </li>
      <li class="comp-agenda__item comp-agenda__item--active">
        <span class="comp-agenda__number">02</span>
        Strategische Optionen und Bewertung
      </li>
      <li class="comp-agenda__item">
        <span class="comp-agenda__number">03</span>
        Finanzplanung und Investitionsrahmen
      </li>
      <li class="comp-agenda__item comp-agenda__item--muted">
        <span class="comp-agenda__number">04</span>
        Umsetzungsplan und n&auml;chste Schritte
      </li>
    </ul>
  </div>
</section>
