<!--
  ============================================================================
  COMPONENT: waterfall
  ============================================================================

  USE WHEN:
    Revenue walks. Cost bridges. Year-over-year change decomposition.
    Showing how a starting value transforms to an ending value via positive
    and negative incremental changes.

  REQUIRED SLOTS:
    - comp-waterfall__title: Slide heading (h2)
    - comp-waterfall__canvas: A <canvas> element with data-chart-config JSON

  OPTIONAL SLOTS:
    - comp-waterfall__legend: Manual legend with color swatches
    - comp-waterfall__legend-item: Individual legend entry (dot + label)

  REQUIRES (CDN):
    - Chart.js 4.x loaded in skeleton (same as chart.html)
    - Uses floating bar technique: each data point is [start, end] tuple

  CSS VARIABLES (set on the <section> wrapper to customize):
    --comp-waterfall-padding       Outer padding. Default: var(--spacing-2xl) var(--spacing-3xl)
    --comp-waterfall-title-color   Slide title color. Default: var(--color-primary)
    --comp-waterfall-canvas-height Canvas max-height. Default: 400px

  STATE MODIFIERS:
    (none — bar colors are set explicitly in Chart.js backgroundColor arrays)

  MASTER LAYER: Visible

  HOW IT WORKS:
    Uses Chart.js floating bar where each data point is [start, end]:
    - Anchor/total bars: grey (#718096)
    - Positive changes: green (#38A169)
    - Negative changes: red (#E53E3E)
    Bar colors are hardcoded per consulting convention (D-09), not token-assigned.

  LAYOUT NOTES:
    - Legend should show three swatches: Ausgangswert (grey), Anstieg (green), Rueckgang (red)
    - overflow-wrap and hyphens enabled for German compound words
    - Canvas label should include start and end value context
  ============================================================================
-->

<section id="slide-1" data-component="waterfall" role="group" aria-label="Wasserfalldiagramm">
  <div class="comp-waterfall">

    <h2 class="comp-waterfall__title">Umsatzbr&uuml;cke Q3 &rarr; Q4 2024</h2>

    <!-- Waterfall: floating bar technique [start, end] per bar -->
    <canvas class="comp-waterfall__canvas"
      aria-label="Wasserfalldiagramm Umsatzverlauf Q3 zu Q4 2024"
      data-chart-config='{
        "type": "bar",
        "data": {
          "labels": [
            "Ausgangswert Q3",
            "Neukundengeschaeft",
            "Preiseffekte",
            "Volumenrueckgang",
            "Waehrungseffekte",
            "Ergebnis Q4"
          ],
          "datasets": [{
            "label": "Umsatz (Mio. EUR)",
            "data": [
              [0, 24.3],
              [24.3, 27.1],
              [27.1, 28.4],
              [26.8, 28.4],
              [26.4, 26.8],
              [0, 26.4]
            ],
            "backgroundColor": [
              "#718096",
              "#38A169",
              "#38A169",
              "#E53E3E",
              "#E53E3E",
              "#718096"
            ]
          }]
        },
        "options": {
          "plugins": {
            "legend": { "display": false }
          },
          "scales": {
            "y": {
              "min": 20,
              "ticks": { "callback": "function(v){ return v + \" Mio.\"; }" }
            }
          }
        }
      }'
    ></canvas>

    <div class="comp-waterfall__legend">
      <div class="comp-waterfall__legend-item">
        <span class="comp-waterfall__legend-dot" style="background:#718096"></span>
        Ausgangswert / Ergebnis
      </div>
      <div class="comp-waterfall__legend-item">
        <span class="comp-waterfall__legend-dot" style="background:#38A169"></span>
        Anstieg
      </div>
      <div class="comp-waterfall__legend-item">
        <span class="comp-waterfall__legend-dot" style="background:#E53E3E"></span>
        R&uuml;ckgang
      </div>
    </div>

  </div>
</section>
