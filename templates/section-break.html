<!--
  COMPONENT: section-break
  USE WHEN: Dividing major sections of a presentation — chapter markers, act transitions.
  SLOTS:
    REQUIRED: __title (h2): section name, keep short (1-4 words)
    OPTIONAL: __subtitle: brief description of what follows in this section
  CSS VARIABLES (--comp-*):
    --comp-section-break-bg: var(--color-primary) — full-slide background color
    --comp-section-break-title-color: var(--color-on-primary) — title text color
    --comp-section-break-subtitle-color: var(--color-dark-text-muted) — subtitle text color
    --comp-section-break-padding: var(--spacing-3xl) — inner padding
    --comp-section-break-title-size: var(--font-size-display) — title font size
  STATE MODIFIERS:
    (none — section break is a structural divider, no interactive states)
  MASTER LAYER: no — hidden (data-master="hide")
  LAYOUT NOTES:
    Full-height centered flex column on dark background (--comp-section-break-bg).
    Override background per brand: set --comp-section-break-bg on the <section> element.
    German section titles may be compound nouns — hyphens: auto handles breaks.
-->

<!-- Component CSS: see tokens/components.css -> comp-section-break section -->

<section id="slide-2" data-component="section-break" data-master="hide" role="group" aria-label="Abschnittsfolie">
  <div class="comp-section-break">
    <h2 class="comp-section-break__title">Marktanalyse</h2>
    <p class="comp-section-break__subtitle">Wettbewerbslandschaft und Marktpotenzial im DACH-Raum</p>
  </div>
</section>
