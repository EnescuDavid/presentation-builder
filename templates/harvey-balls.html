<!--
  ============================================================================
  COMPONENT: harvey-balls
  ============================================================================

  USE WHEN:
    Capability ratings in tables. Maturity assessments. Feature comparisons.
    Vendor evaluations. Skill matrices. Compliance scorecards.

  REQUIRED SLOTS:
    - comp-harvey-balls__title: Slide heading (h2)
    - comp-harvey-balls__table: The HTML table element with thead/tbody
    - comp-harvey-balls__cell: Individual data cells (td elements)
    - comp-harvey-balls__ball: Harvey ball circle element with --hb-fill inline var

  OPTIONAL SLOTS:
    - comp-harvey-balls__cell--highlighted: Accent border, key cell callout
    - comp-harvey-balls__cell--risk: Danger color, risk flag on ball

  CSS VARIABLES (set on the <section> wrapper to customize):
    --comp-harvey-balls-padding     Outer padding. Default: var(--spacing-2xl) var(--spacing-3xl)
    --comp-harvey-balls-title-color Slide title color. Default: var(--color-primary)
    --comp-harvey-balls-ball-size   Ball diameter. Default: 24px
    --comp-harvey-balls-fill-color  Fill color of ball. Default: var(--color-primary)
    --comp-harvey-balls-empty-color Empty (unfilled) color. Default: var(--color-border)

  STATE MODIFIERS (on comp-harvey-balls__cell):
    .comp-harvey-balls__cell--highlighted  Accent border, key cell callout
    .comp-harvey-balls__cell--risk         Danger color on the ball fill

  BALL FILL VALUES (set via --hb-fill inline style on comp-harvey-balls__ball):
    style="--hb-fill:0%"    Empty (leer)
    style="--hb-fill:25%"   Quarter full (ein Viertel)
    style="--hb-fill:50%"   Half full (halb)
    style="--hb-fill:75%"   Three-quarter full (dreiviertel)
    style="--hb-fill:100%"  Full (vollstaendig)

  MASTER LAYER: Visible

  LAYOUT NOTES:
    - Harvey balls render via conic-gradient, no SVG dependency
    - Ball cells should center-align text for visual balance
    - overflow-wrap and hyphens enabled for German compound words
    - Align ball columns to center: style="text-align:center"
  ============================================================================
-->
