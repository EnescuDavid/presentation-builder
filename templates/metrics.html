<!--
  COMPONENT: metrics
  USE WHEN: Highlighting 1-6 key numbers — KPIs, performance data, revenue, growth rates.
  SLOTS:
    REQUIRED: __title (h2): slide title / context for the numbers
    REQUIRED: __grid: flex/grid container for metric cards
    REQUIRED: __card (×1-6): individual metric card wrapper
    REQUIRED: __number (span inside __card): the big number (e.g. "+23%", "EUR 4,2 Mrd.")
    REQUIRED: __label (span inside __card): short descriptor (ALL CAPS, e.g. "UMSATZWACHSTUM")
    OPTIONAL: __trend (div inside __card): trend arrow + delta text (--up, --down, --flat)
    OPTIONAL: __trend-arrow (svg inside __trend): directional arrow SVG
    OPTIONAL: __bars (div inside __card): mini bar sparkline
    OPTIONAL: __bar (div inside __bars): individual bar (set height via inline style)
    OPTIONAL: __progress (div inside __card): horizontal progress bar
    OPTIONAL: __progress-fill (div inside __progress): fill (set width via inline style)
  CSS VARIABLES (--comp-*):
    --comp-metrics-gap: var(--spacing-3xl) — gap between metric cards
    --comp-metrics-card-padding: var(--spacing-lg) — card inner padding
    --comp-metrics-number-size: var(--font-size-display) — number font size
    --comp-metrics-label-size: var(--font-size-caption) — label font size
    --comp-metrics-card-bg: transparent — card background color
    --comp-metrics-number-color: var(--color-primary) — default number color
  STATE MODIFIERS:
    .comp-metrics__card--highlighted — accent border + highlight background, hero metric
    .comp-metrics__card--positive — success color on __number (good outcome)
    .comp-metrics__card--negative — danger color on __number (bad outcome / decline)
    .comp-metrics__card--muted — reduced opacity (0.45), secondary metric
    .comp-metrics__card--risk — danger border + callout background, risk flag
  MASTER LAYER: yes — visible
  LAYOUT NOTES:
    1-3 metrics: use __grid (flex row). 4-6 metrics: add __grid--compact (CSS grid, 3 cols).
    Numbers use tabular-nums for alignment. German: hyphens: auto on .comp-metrics.
    Sparkline types: trend indicator (arrow + delta), mini bars, progress bar.
-->

<!-- Component CSS: see tokens/components.css -> comp-metrics section -->

<section id="slide-5" data-component="metrics" role="group" aria-label="Kennzahlen-Folie">
  <div class="comp-metrics">
    <h2 class="comp-metrics__title">Gesch&auml;ftsentwicklung Q3 2025</h2>
    <div class="comp-metrics__grid">

      <div class="comp-metrics__card comp-metrics__card--positive">
        <span class="comp-metrics__number">+23%</span>
        <span class="comp-metrics__label">Umsatzwachstum</span>
        <div class="comp-metrics__trend comp-metrics__trend--up">
          <svg class="comp-metrics__trend-arrow" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 2L10 8H2L6 2Z" fill="currentColor"/>
          </svg>
          +5pp vs. Vorjahr
        </div>
      </div>

      <div class="comp-metrics__card comp-metrics__card--highlighted">
        <span class="comp-metrics__number">EUR 4,2 Mrd.</span>
        <span class="comp-metrics__label">Gesamtumsatz</span>
        <div class="comp-metrics__bars" aria-hidden="true">
          <div class="comp-metrics__bar" style="height: 50%"></div>
          <div class="comp-metrics__bar" style="height: 60%"></div>
          <div class="comp-metrics__bar" style="height: 55%"></div>
          <div class="comp-metrics__bar" style="height: 70%"></div>
          <div class="comp-metrics__bar" style="height: 80%"></div>
          <div class="comp-metrics__bar" style="height: 100%"></div>
        </div>
      </div>

      <div class="comp-metrics__card comp-metrics__card--negative">
        <span class="comp-metrics__number">&minus;8pp</span>
        <span class="comp-metrics__label">EBITDA-Marge</span>
        <div class="comp-metrics__trend comp-metrics__trend--down">
          <svg class="comp-metrics__trend-arrow" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 10L2 4H10L6 10Z" fill="currentColor"/>
          </svg>
          unter Planwert
        </div>
      </div>

    </div>
  </div>
</section>
