<!--
  COMPONENT: image-full-bleed
  USE WHEN: Visual impact — product shots, team photos, mood/atmosphere, inspiring imagery.
  SLOTS:
    REQUIRED: __image (img): the background image (absolute, inset: 0, object-fit: cover)
    OPTIONAL: __overlay (div): dark/semi-transparent overlay layer (z-index: 1)
    OPTIONAL: __caption (div/p): text overlay on top of image (z-index: 2)
  CSS VARIABLES (--comp-*):
    --comp-image-full-bleed-overlay: var(--color-overlay) — overlay color/opacity
    --comp-image-full-bleed-caption-color: var(--color-on-primary) — caption text color
  STATE MODIFIERS:
    (none — structural full-screen image slide, no interactive states)
  MASTER LAYER: no — hidden (data-master="hide")
  LAYOUT NOTES:
    .comp-image-full-bleed is position: relative, height: 100%, overflow: hidden.
    __image is position: absolute, inset: 0 (fills entire slide behind overlay).
    __overlay is position: absolute, inset: 0 (sits between image and caption).
    __caption is position: relative, z-index: 2 (text above overlay).
    Layout: flex column, justify-content: flex-end (caption at bottom).
    For image-only slides: omit __overlay and __caption entirely.
    For reveal.js data-background-image: use section attribute instead of __image element.
-->

<!-- Component CSS: see tokens/components.css -> comp-image-full-bleed section -->

<section id="slide-6" data-component="image-full-bleed" data-master="hide" role="group" aria-label="Vollbild-Bildfolie">
  <div class="comp-image-full-bleed">
    <!-- Replace src with actual image path; use alt text for accessibility -->
    <img class="comp-image-full-bleed__image"
         src="path/to/bild.jpg"
         alt="Skyline Frankfurt bei Sonnenuntergang — Innovationsstandort DACH">
    <div class="comp-image-full-bleed__overlay"></div>
    <div class="comp-image-full-bleed__caption">
      <p>Unsere Vision &mdash; Digitale F&uuml;hrerschaft im DACH-Raum bis 2027</p>
    </div>
  </div>
</section>
