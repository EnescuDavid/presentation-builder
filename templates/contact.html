<!--
  COMPONENT: contact
  USE WHEN: Speaker info, call to action, closing slide with presenter details.
  SLOTS:
    REQUIRED: __name (h2): presenter's full name with title (e.g. "Dr. Maria Schmidt")
    REQUIRED: __role (p): job title and company or team name
    OPTIONAL: __photo (img): headshot, 120x120px, circular (border-radius: 50%)
    OPTIONAL: __details (div): contact detail rows container
    OPTIONAL: __detail-item (div inside __details): one row (icon + label or plain text)
  CSS VARIABLES (--comp-*):
    --comp-contact-padding: var(--spacing-2xl) var(--spacing-3xl) — outer padding
    --comp-contact-name-size: var(--font-size-heading) — name font size
    --comp-contact-name-color: var(--color-primary) — name text color
    --comp-contact-role-color: var(--color-text-muted) — role text color
    --comp-contact-photo-size: 120px — photo diameter
  STATE MODIFIERS:
    (none — contact is a closing static slide)
  MASTER LAYER: yes — visible
  LAYOUT NOTES:
    D-02 structural fix: centered flex column layout (not a grid).
    Photo: position: relative, width/height: --comp-contact-photo-size, border-radius: 50%.
    Name hierarchy: __photo → __name (h2) → __role → __details.
    Details: flex column with gap: var(--spacing-xs), center-aligned items.
    Each __detail-item: flex row with gap: var(--spacing-sm) for icon + text pairs.
    German phone format: +49 89 1234 5678. German email: vorname.nachname@firma.de
-->

<!-- Component CSS: see tokens/components.css -> comp-contact section -->

<section id="slide-9" data-component="contact" role="group" aria-label="Kontaktfolie">
  <div class="comp-contact">
    <!-- Replace src with real photo path; use empty alt if photo is decorative -->
    <img class="comp-contact__photo"
         src="path/to/foto.jpg"
         alt="Dr. Maria Schmidt, Senior Partnerin">
    <h2 class="comp-contact__name">Dr. Maria Schmidt</h2>
    <p class="comp-contact__role">Senior Partnerin &middot; Strategie &amp; Transformation</p>
    <div class="comp-contact__details">
      <div class="comp-contact__detail-item">
        m.schmidt@beratung-gmbh.de
      </div>
      <div class="comp-contact__detail-item">
        +49 89 1234 5678
      </div>
      <div class="comp-contact__detail-item">
        linkedin.com/in/dr-maria-schmidt
      </div>
    </div>
  </div>
</section>
