<!--
  ============================================================================
  COMPONENT: Contact/CTA (COMP-09)
  ============================================================================

  USE WHEN:
    Closing slide. Contact details. Call to action. Speaker info.

  REQUIRED SLOTS:
    - Name
    - Role

  OPTIONAL SLOTS:
    - Photo (img 120x120 rounded)
    - Email
    - Phone
    - Divider line

  MASTER LAYER: Visible (no data-master attribute)

  LAYOUT NOTES:
    - Centered column layout, photo optional
    - Divider via anim-lineGrow
    - Contact details in horizontal row
    - overflow-wrap and hyphens enabled for German compound words
  FRAGMENTS: Optional — Claude adds fragment classes for progressive reveal when requested

  EXAMPLE:
    <section data-component="contact" role="group" aria-label="Kontakt">
      <div class="comp-contact">
        <img class="comp-contact__photo" src="photo.jpg" alt="Name" />
        <h2 class="comp-contact__name">Dr. Maria Schmidt</h2>
        <p class="comp-contact__role">Geschäftsführerin</p>
        <div class="comp-contact__divider"></div>
        <div class="comp-contact__details">
          <span class="comp-contact__detail">m.schmidt@firma.de</span>
          <span class="comp-contact__detail">+49 30 1234 5678</span>
        </div>
      </div>
    </section>

  ============================================================================
-->

<style>
  /* --- Contact/CTA Component --- */
  .comp-contact {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100%;
    padding: var(--spacing-3xl);
    gap: var(--spacing-lg);
  }

  .comp-contact__photo {
    width: 120px;
    height: 120px;
    border-radius: var(--radius-full);
    object-fit: cover;
    box-shadow: var(--shadow-md);
  }

  .comp-contact__name {
    font-size: var(--font-size-heading);
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
  }

  .comp-contact__role {
    font-size: var(--font-size-subheading);
    color: var(--color-text-muted);
    font-weight: var(--font-weight-light);
  }

  .comp-contact__divider {
    width: 60px;
    height: 2px;
    background: var(--color-accent);
  }

  .comp-contact__details {
    display: flex;
    gap: var(--spacing-2xl);
    font-size: var(--font-size-body);
    color: var(--color-text);
  }

  .comp-contact__detail {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
  }
</style>

<section data-component="contact" role="group" aria-label="Kontakt">
  <div class="comp-contact">
    <img class="comp-contact__photo" src="https://via.placeholder.com/120" alt="Dr. Maria Schmidt" />
    <h2 class="comp-contact__name">Dr. Maria Schmidt</h2>
    <p class="comp-contact__role">Geschäftsführerin Digitale Transformation</p>
    <div class="comp-contact__divider"></div>
    <div class="comp-contact__details">
      <span class="comp-contact__detail">m.schmidt@unternehmen.de</span>
      <span class="comp-contact__detail">+49 30 1234 5678</span>
    </div>
  </div>
</section>
