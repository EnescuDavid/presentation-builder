<!--
  ============================================================================
  COMPONENT: Team/People (COMP-20)
  ============================================================================

  USE WHEN:
    Team credentials slide. Leadership page. Project team introduction.
    Advisory board. 2-6 members.

  REQUIRED SLOTS:
    - 2-6 team members, each with name and role

  OPTIONAL SLOTS:
    - Slide title (h2)
    - Photo (circular crop)
    - Contact info (email/phone)
    - Short bio text

  MASTER LAYER: Visible

  LAYOUT NOTES:
    - Three layout variants -- photo grid (default), card-based, text-only
    - Claude picks variant based on content provided:
      * Default (photo grid): when photos are available
      * comp-team--cards: when members need more structured card layout
      * comp-team--text: when no photos, text-only credentials
    - CSS Grid auto-fit handles 2-6 members automatically
    - Photos are circular crop via border-radius: radius-full
    - German names and roles with overflow-wrap for compound words
  FRAGMENTS: Optional -- Claude adds fragment classes for progressive reveal when requested

  EXAMPLE:
    <section data-component="team">
      <div class="comp-team">
        <h2>Unser Fuehrungsteam</h2>
        <div class="comp-team__grid">
          <div class="comp-team__member">
            <img class="comp-team__photo" src="photo.jpg" alt="Name" />
            <div class="comp-team__name">Dr. Maria Schmidt</div>
            <div class="comp-team__role">Geschaeftsfuehrerin</div>
            <div class="comp-team__contact">m.schmidt@firma.de</div>
          </div>
        </div>
      </div>
    </section>

  ============================================================================
-->

<style>
  /* --- Team/People Component --- */

  /* Base layout */
  .comp-team {
    display: flex;
    flex-direction: column;
    padding: var(--spacing-2xl) var(--spacing-3xl);
    min-height: 100%;
    overflow-wrap: break-word;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  .comp-team h2 {
    font-size: var(--font-size-heading);
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
    margin-bottom: var(--spacing-2xl);
  }

  .comp-team__grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: var(--spacing-xl);
    justify-items: center;
  }

  /* Photo grid variant (default) */
  .comp-team__member {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: var(--spacing-sm);
  }

  .comp-team__photo {
    width: 100px;
    height: 100px;
    border-radius: var(--radius-full);
    object-fit: cover;
    box-shadow: var(--shadow-md);
  }

  .comp-team__name {
    font-size: var(--font-size-subheading);
    font-weight: var(--font-weight-semibold);
    color: var(--color-primary);
  }

  .comp-team__role {
    font-size: var(--font-size-caption);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .comp-team__contact {
    font-size: var(--font-size-caption);
    color: var(--color-text-muted);
  }

  .comp-team__bio {
    font-size: var(--font-size-caption);
    color: var(--color-text);
    line-height: var(--line-height-normal);
    max-width: 200px;
  }

  /* Card variant */
  .comp-team--cards .comp-team__grid {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .comp-team--cards .comp-team__member {
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    padding: var(--spacing-lg);
    box-shadow: var(--shadow-card);
    align-items: center;
    width: 100%;
  }

  .comp-team--cards .comp-team__photo {
    width: 80px;
    height: 80px;
  }

  /* Text-only variant (no photos) */
  .comp-team--text .comp-team__grid {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--spacing-lg);
  }

  .comp-team--text .comp-team__member {
    align-items: flex-start;
    text-align: left;
    padding-left: var(--spacing-md);
    border-left: 3px solid var(--color-accent);
  }
</style>
