<!--
  ============================================================================
  COMPONENT: team
  ============================================================================

  USE WHEN:
    Team credentials slide. Leadership page. Project team introduction.
    Advisory board presentation. 2-6 members with photo, name, and role.

  REQUIRED SLOTS:
    - comp-team__title: Slide heading (h2)
    - comp-team__grid: Grid container holding member cards
    - comp-team__member (x2-6): Individual member card
    - comp-team__name: Member full name
    - comp-team__role: Member role/title

  OPTIONAL SLOTS:
    - comp-team__photo: Headshot image (circular crop, 96x96)
    - [contact info below role]: Add plain text or link for email/phone

  CSS VARIABLES (set on the <section> wrapper to customize):
    --comp-team-padding      Outer padding. Default: var(--spacing-2xl) var(--spacing-3xl)
    --comp-team-gap          Grid gap between members. Default: var(--spacing-xl)
    --comp-team-title-color  Slide title color. Default: var(--color-primary)
    --comp-team-photo-size   Photo diameter. Default: 96px

  STATE MODIFIERS (on comp-team__member):
    .comp-team__member--highlighted  Accent border + highlight background, featured member (e.g. team lead)
    .comp-team__member--muted        Reduced opacity, de-emphasized member

  MASTER LAYER: Visible

  LAYOUT NOTES:
    - CSS Grid auto-fit minmax(180px, 1fr) handles 2-6 members automatically
    - Photos use border-radius: var(--radius-full) for circular crop
    - object-fit: cover on photo for consistent framing
    - overflow-wrap and hyphens enabled for German compound titles
    - For no photo: omit the img element; grid adjusts automatically
  ============================================================================
-->

<section id="slide-1" data-component="team" role="group" aria-label="Projektteam">
  <div class="comp-team">

    <h2 class="comp-team__title">Unser Projektteam</h2>

    <div class="comp-team__grid">

      <div class="comp-team__member comp-team__member--highlighted">
        <img class="comp-team__photo"
          src="https://via.placeholder.com/96"
          alt="Dr. Anna Weber, Projektleiterin" />
        <div class="comp-team__name">Dr. Anna Weber</div>
        <div class="comp-team__role">Projektleiterin</div>
      </div>

      <div class="comp-team__member">
        <img class="comp-team__photo"
          src="https://via.placeholder.com/96"
          alt="Markus Schmidt, Senior Berater" />
        <div class="comp-team__name">Markus Schmidt</div>
        <div class="comp-team__role">Senior Berater</div>
      </div>

      <div class="comp-team__member">
        <img class="comp-team__photo"
          src="https://via.placeholder.com/96"
          alt="Julia Hoffmann, Datenanalystin" />
        <div class="comp-team__name">Julia Hoffmann</div>
        <div class="comp-team__role">Datenanalystin</div>
      </div>

      <div class="comp-team__member">
        <img class="comp-team__photo"
          src="https://via.placeholder.com/96"
          alt="Thomas Bauer, IT-Architekt" />
        <div class="comp-team__name">Thomas Bauer</div>
        <div class="comp-team__role">IT-Architekt</div>
      </div>

    </div>

  </div>
</section>
