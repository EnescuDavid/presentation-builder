<!--
  COMPONENT: title
  USE WHEN: Opening slide of any presentation — first impression, governing thought.
  SLOTS:
    REQUIRED: __title (h2): main presentation title, keep under 8 words
    OPTIONAL: __divider: decorative accent line between title and subtitle
    OPTIONAL: __subtitle: context line — date, company, event, occasion
    OPTIONAL: __tagline: secondary supporting line below subtitle
  CSS VARIABLES (--comp-*):
    --comp-title-padding: var(--spacing-3xl) — inner padding of the slide
    --comp-title-title-size: var(--font-size-display) — title font size
    --comp-title-title-color: var(--color-primary) — title text color
    --comp-title-subtitle-size: var(--font-size-subheading) — subtitle font size
    --comp-title-divider-color: var(--color-accent) — divider bar color
    --comp-title-divider-width: 120px — divider bar width
  STATE MODIFIERS:
    (none — title is a static opening slide, no interactive states)
  MASTER LAYER: no — hidden (data-master="hide")
  LAYOUT NOTES:
    Centered flex column, full height. German compound words handled by
    overflow-wrap: break-word and hyphens: auto on .comp-title.
    Set --comp-title-title-size smaller on <section> for very long titles.
-->

<!-- Component CSS: see tokens/components.css -> comp-title section -->

<section id="slide-1" data-component="title" data-master="hide" class="center" role="group" aria-label="Titelfolie">
  <div class="comp-title">
    <h2 class="comp-title__title">Digitale Transformation 2025</h2>
    <div class="comp-title__divider"></div>
    <p class="comp-title__subtitle">Strategische Neuausrichtung &middot; Vorstandssitzung Q3 2025</p>
    <p class="comp-title__tagline">Strategie &amp; Innovation GmbH &middot; Oktober 2025</p>
  </div>
</section>
